<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTCHER APP</title>
    <link rel="stylesheet" href="index.css">
   
</head>
<body>
    <main class="login-container">
        <form action="" class="login-form">
            <h1>Login</h1>
            <input id="phoneNumber" type="tel" placeholder="Mobile Number" maxlength="10" autocomplete="tel-national">
            <input id="getOtpBtn" type="button" value="GET OTP">
          
            <input type="button" value="signup" onclick="window.location.href='signup.html'">
            <p id="otpStatus" class="otp-status"></p>
            
            <footer>By continuing, you agree to the Terms & Conditions and Privacy Policy</footer>
        </form>
    </main>

    <script>
        const phoneInput = document.getElementById('phoneNumber');
        const getOtpBtn = document.getElementById('getOtpBtn');
        const otpInput = document.getElementById('otp');
        const otpStatus = document.getElementById('otpStatus');
        let lastVerifiedOtpKey = '';
        const isFileProtocol = window.location.protocol === 'file:';

        const signupSuccessMessage = sessionStorage.getItem('signupSuccessMessage');
        if (signupSuccessMessage) {
            otpStatus.textContent = signupSuccessMessage;
            sessionStorage.removeItem('signupSuccessMessage');
        }

        if (isFileProtocol) {
            otpStatus.textContent = 'Open this app at http://localhost:3000 (not by double-clicking the HTML file).';
        }

        async function parseApiResponse(response) {
            const contentType = response.headers.get('content-type') || '';
            const responseClone = response.clone();

            if (contentType.includes('application/json')) {
                try {
                    return await response.json();
                } catch (_) {
                    const fallbackText = await responseClone.text();
                    return {
                        message: fallbackText || 'Server returned invalid JSON response'
                    };
                }
            }

            const text = await response.text();
            const isHtml = /<!doctype html>|<html/i.test(text);
            return {
                message: isHtml
                    ? 'Backend API not reachable. Open app using http://localhost:3000'
                    : (text || `No response body from server (status ${response.status})`)
            };
        }

        async function sendOtp(phone) {
            if (isFileProtocol) {
                otpStatus.textContent = 'Backend API not reachable. Open app using http://localhost:3000';
                return;
            }

            otpStatus.textContent = 'Sending OTP...';

            try {
                const response = await fetch('/send-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phoneNumber: phone })
                });

                const result = await parseApiResponse(response);

                if (!response.ok) {
                    throw new Error(result.message || 'OTP request failed');
                }

                otpStatus.textContent = result.message || 'OTP sent to your mobile number.';
            } catch (error) {
                otpStatus.textContent = error.message || 'Unable to send OTP. Start backend with npm start.';
            }
        }

        async function verifyOtp(phone, otp) {
            if (isFileProtocol) {
                otpStatus.textContent = 'Backend API not reachable. Open app using http://localhost:3000';
                return;
            }

            otpStatus.textContent = 'Verifying OTP...';

            try {
                const response = await fetch('/verify-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phoneNumber: phone, otp })
                });

                const result = await parseApiResponse(response);

                if (!response.ok) {
                    throw new Error(result.message || 'OTP verification failed');
                }

                otpStatus.textContent = result.message || 'OTP verified successfully';
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 700);
            } catch (error) {
                otpStatus.textContent = error.message || 'Unable to verify OTP. Start backend with npm start.';
                lastVerifiedOtpKey = '';
            }
        }

        phoneInput.addEventListener('input', () => {
            const digitsOnly = phoneInput.value.replace(/\D/g, '');
            phoneInput.value = digitsOnly;
        });

        getOtpBtn.addEventListener('click', () => {
            const phoneDigits = phoneInput.value.replace(/\D/g, '');

            if (phoneDigits.length !== 10) {
                otpStatus.textContent = 'Enter a valid 10-digit mobile number.';
                return;
            }

            sendOtp(phoneDigits);
        });

        if (otpInput) {
            otpInput.addEventListener('input', () => {
            const otpDigits = otpInput.value.replace(/\D/g, '');
            otpInput.value = otpDigits;

            const phoneDigits = phoneInput.value.replace(/\D/g, '');
            if (phoneDigits.length !== 10) {
                otpStatus.textContent = 'Enter mobile number first.';
                return;
            }

            if (otpDigits.length === 6) {
                const key = `${phoneDigits}:${otpDigits}`;
                if (key !== lastVerifiedOtpKey) {
                    lastVerifiedOtpKey = key;
                    verifyOtp(phoneDigits, otpDigits);
                }
            }
            });
        }
    </script>
</body>
</html>
