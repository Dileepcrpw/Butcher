<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTCHER APP</title>
    <link rel="stylesheet" href="index.css">
   
</head>
<body>
    <main class="login-container">
        <form id="loginForm" action="" class="login-form">
            <h1>Login</h1>
            <input id="phoneNumber" type="tel" placeholder="Mobile Number" maxlength="10" autocomplete="tel-national" required>
            <input id="password" type="password" placeholder="password" maxlength="6" autocomplete="current-password" required>
            <a href="forgotpassword.html" class="forgotpassword">Forgotpassword?</a>
            <button type="submit" class="btn btn-login">Log in</button>
            <a href="signup.html" class="btn btn-signup">Sign up</a>
            <footer>By continuing, you agree to the Terms & Conditions and Privacy Policy</footer>
        </form>
    </main>
    <script src="auth.js"></script>
</body>
</html>
