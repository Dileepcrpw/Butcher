<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home — BUTCHER APP</title>
    <link rel="stylesheet" href="index.css">
</head>
<body class="home-page">
    <header class="home-search-header" role="search">
        <form class="home-search-form" action="#" method="get">
            <label class="home-search-label" for="home-search">Search</label>
            <input type="search" id="home-search" name="q" class="home-search-input" placeholder="Search" autocomplete="off" />
        </form>
    </header>
    <main class="home-container">
        <h1>Home</h1>
        <p class="home-welcome">You are signed in.</p>

        <article class="home-product-card" aria-labelledby="product-lamb-title">
            <div class="home-product-card-media">
                <img
                    src="lamb-chops-plate.png"
                    alt="Six fresh raw lamb chops arranged in a circle on a tan ceramic plate with a sheep illustration, on a dark wooden table"
                    width="100"
                    height="100"
                    loading="lazy"
                />
            </div>
            <form class="home-product-form" action="#" method="post">
                <h2 id="product-lamb-title" class="home-product-title">Lamb chops</h2>
                <p class="home-product-meta">Fresh · per kg</p>
                <label class="home-product-qty-label" for="qty-lamb">Qty (kg)</label>
                <input type="number" id="qty-lamb" name="quantity" class="home-product-qty" min="0.5" max="50" step="0.5" value="1" />
                <button type="submit" class="btn home-product-submit">Add to cart</button>
            </form>
        </article>

        <div class="home-product-row home-product-row-chicken-fish">
            <article class="home-product-card" aria-labelledby="product-chicken-title">
                <div class="home-product-card-media">
                    <img src="chicken-product.png" alt="Whole raw chicken" width="100" height="100" loading="lazy" />
                </div>
                <form class="home-product-form" action="#" method="post">
                    <h2 id="product-chicken-title" class="home-product-title">Whole chicken</h2>
                    <p class="home-product-meta">Fresh · per kg</p>
                    <label class="home-product-qty-label" for="qty-chicken">Qty (kg)</label>
                    <input type="number" id="qty-chicken" name="quantity" class="home-product-qty" min="0.5" max="50" step="0.5" value="1" />
                    <button type="submit" class="btn home-product-submit">Add to cart</button>
                </form>
            </article>

            <article class="home-product-card" aria-labelledby="product-fish-title">
                <div class="home-product-card-media">
                    <img
                        src="fish-product.png"
                        alt="Raw fish steaks on a black plate with spices"
                        width="100"
                        height="100"
                        loading="lazy"
                    />
                </div>
                <form class="home-product-form" action="#" method="post">
                    <h2 id="product-fish-title" class="home-product-title">Fish steaks</h2>
                    <p class="home-product-meta">Fresh · per kg</p>
                    <label class="home-product-qty-label" for="qty-fish">Qty (kg)</label>
                    <input type="number" id="qty-fish" name="quantity" class="home-product-qty" min="0.5" max="50" step="0.5" value="1" />
                    <button type="submit" class="btn home-product-submit">Add to cart</button>
                </form>
            </article>
        </div>

        <a href="Index.html" class="btn btn-signup btn-back-corner">Back to login</a>
    </main>

    <nav class="bottom-segmented-nav" aria-label="Primary">
        <div class="bottom-segmented-inner">
            <a href="home.html" class="segment segment-active" aria-current="page">Home</a>
            <a href="#" class="segment">My orders</a>
            <a href="#" class="segment">My cart</a>
            <a href="#" class="segment">Profile</a>
        </div>
    </nav>
</body>
</html>
