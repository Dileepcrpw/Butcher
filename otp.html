<!DOCTYPE html>
<html lang="en" class="otp-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP — BUTCHER APP</title>
    <link rel="stylesheet" href="index.css">
</head>
<body class="otp-screen">
    <main class="otp-container">
        <h1 class="otp-title">Login</h1>
        <p class="otp-sent-msg">
            We've sent a verification code to <span id="otpPhoneDisplay" class="otp-phone"></span>
        </p>
        <form id="otpForm" class="otp-form">
            <input id="otpInput" type="text" inputmode="numeric" maxlength="6" placeholder="OTP" autocomplete="one-time-code" required>
            <button type="submit" class="btn-verify-otp">Verify OTP</button>
        </form>
        <button type="button" id="resendOtp" class="link-resend">Resend OTP</button>
    </main>
    <script src="auth.js"></script>
</body>
</html>
