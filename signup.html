<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up — BUTCHER APP</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="login-container">
        <form action="" class="login-form signup-form" id="signupForm">
            <h1>Sign up</h1>
            <p>Create your account with the details below.</p>
            <input id="fullName" type="text" placeholder="Full name" autocomplete="name" required>
            <input id="signupPhone" type="tel" placeholder="Mobile number" maxlength="10" autocomplete="tel-national" required>
            <input id="signupEmail" type="email" placeholder="Email" autocomplete="email">
            <input id="signupPassword" type="password" placeholder="Password" autocomplete="new-password" required>
            <input id="signupSubmit" type="submit" value="Create account">
            <a href="Index.html" class="back-to-login">Already have an account? Login</a>
            <footer>By continuing, you agree to the Terms & Conditions and Privacy Policy</footer>
        </form>
    </main>
    <script src="auth.js"></script>
</body>
</html>
