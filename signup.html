<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Butcher App</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="login-container">
        <form id="signupForm" class="login-form">
            <h1>Sign Up</h1>
            <p>Create your account</p>
            <input id="signupName" type="text" placeholder="Name" autocomplete="name" required>
            <input id="signupEmail" type="email" placeholder="Email" autocomplete="email" required>
            <input id="signupPhone" type="tel" placeholder="Mobile Number" maxlength="10" autocomplete="tel-national" required>
            <input id="signupSubmit" type="submit" value="Create Account">
            <input type="button" value="Back to Login" onclick="window.location.href='Index.html'">
            <p id="signupStatus" class="otp-status"></p>
        </form>
    </main>

    <script>
        const signupForm = document.getElementById('signupForm');
        const nameInput = document.getElementById('signupName');
        const emailInput = document.getElementById('signupEmail');
        const phoneInput = document.getElementById('signupPhone');
        const submitButton = document.getElementById('signupSubmit');
        const signupStatus = document.getElementById('signupStatus');
        const isFileProtocol = window.location.protocol === 'file:';

        function getLocalUsers() {
            try {
                const raw = localStorage.getItem('butcherUsers');
                return raw ? JSON.parse(raw) : [];
            } catch (_) {
                return [];
            }
        }

        function saveLocalUser(user) {
            const users = getLocalUsers();
            const duplicate = users.find((item) => item.email === user.email || item.phoneNumber === user.phoneNumber);

            if (duplicate) {
                throw new Error('Account already exists with this email or phone number');
            }

            users.push(user);
            localStorage.setItem('butcherUsers', JSON.stringify(users));
        }

        async function parseApiResponse(response) {
            const contentType = response.headers.get('content-type') || '';

            if (contentType.includes('application/json')) {
                try {
                    return await response.json();
                } catch (_) {
                    return { message: 'Invalid response from server' };
                }
            }

            const text = await response.text();
            return { message: text || 'Server returned an empty response' };
        }

        phoneInput.addEventListener('input', () => {
            phoneInput.value = phoneInput.value.replace(/\D/g, '');
        });

        signupForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const phoneNumber = phoneInput.value.replace(/\D/g, '');

            if (!name || !email || phoneNumber.length !== 10) {
                signupStatus.textContent = 'Enter valid name, email, and 10-digit mobile number.';
                return;
            }

            signupStatus.textContent = 'Creating account...';
            submitButton.disabled = true;

            try {
                const payload = { name, email, phoneNumber };

                if (isFileProtocol) {
                    saveLocalUser({
                        id: Date.now(),
                        name,
                        email: email.toLowerCase(),
                        phoneNumber,
                        createdAt: new Date().toISOString()
                    });
                    signupStatus.textContent = 'Sign up successful';
                    signupForm.reset();
                    setTimeout(() => {
                        sessionStorage.setItem('signupSuccessMessage', 'Account created successfully');
                        window.location.href = 'Index.html';
                    }, 700);
                    return;
                }

                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await parseApiResponse(response);

                if (!response.ok) {
                    throw new Error(result.message || 'Signup failed');
                }

                signupStatus.textContent = result.message || 'Sign up successful';
                signupForm.reset();

                setTimeout(() => {
                    sessionStorage.setItem('signupSuccessMessage', 'Account created successfully');
                    window.location.href = 'Index.html';
                }, 1000);
            } catch (error) {
                signupStatus.textContent = error.message || 'Unable to create account.';
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
